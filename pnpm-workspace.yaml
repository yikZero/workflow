packages:
  - workbench/*
  - "!workbench/nitro"
  - packages/*
  - docs
  - tarballs

catalog:
  "@biomejs/biome": ^2.4.4
  "@swc/core": 1.15.3
  "@types/json-schema": ^7.0.15
  "@types/node": 22.19.0
  "@vercel/functions": ^3.4.3
  "@vercel/oidc": 3.2.0
  "@vercel/queue": 0.4.0
  "@vitest/coverage-v8": ^4.1.10
  ai: 6.0.116
  enhanced-resolve: 5.19.0
  esbuild: ^0.28.1
  nitro: ^3.0.260610-beta
  semver: 7.7.4
  typescript: ^6.0.3
  ulid: ~3.0.1
  undici: 7.28.0
  vitest: ^4.1.10
  zod: ~4.3.6

onlyBuiltDependencies:
  - esbuild

overrides:
  # Single @opentelemetry/api instance workspace-wide: with two resolved
  # copies (1.9.0 + 1.9.1), the copy that registers the tracer provider and
  # the copy a package imports can differ, and the API's global-registration
  # version check then hands the importer a noop tracer — world-vercel's
  # spans were silently dropped this way while core's flowed (#2900).
  '@opentelemetry/api': 1.9.1
  rfc6902: 5.1.2
  devalue: 5.8.1
  '@sveltejs/acorn-typescript': 1.0.10
  # postcss < 8.5.12 is vulnerable to CVE-2026-45623 (arbitrary file read via
  # attacker-controlled sourceMappingURL). Forces transitive pins (e.g.
  # next.js's postcss@8.4.31) onto a patched version.
  'postcss@<8.5.12': 8.5.16

savePrefix: ""

minimumReleaseAge: 2880

minimumReleaseAgeExclude:
  - '@turbo/*'
  - 'turbo'
  - '@vercel/*'
  - '@workflow/*'
  - 'esbuild'
  - '@esbuild/*'
