name: Backport to stable

on:
  pull_request_target:
    types: [closed, labeled]
    branches: [main]

concurrency: backport-stable

jobs:
  backport:
    name: Backport to stable
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'backport-stable')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Cherry-pick to stable
        id: cherry-pick
        run: |
          MERGE_SHA="${{ github.event.pull_request.merge_commit_sha }}"
          git config user.name "$(git log -1 --format='%an' "$MERGE_SHA")"
          git config user.email "$(git log -1 --format='%ae' "$MERGE_SHA")"
          git checkout stable
          if git cherry-pick "$MERGE_SHA" --no-edit --signoff; then
            echo "status=clean" >> "$GITHUB_OUTPUT"
            echo "cherry_pick_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            # Auto-resolve conflicts in directories that are not maintained
            # on the stable branch by keeping the stable side (discarding the
            # incoming change from main):
            #   - docs/ (except docs/content/): the docs app is a minimal
            #     placeholder on stable; only docs/content/ is actively
            #     maintained (markdown files bundled into npm packages via
            #     prepack scripts).
            #   - skills/: skill files are unrelated to npm packaging and
            #     are not maintained on stable.
            git diff --name-only --diff-filter=U \
              | { grep -E '^(docs/|skills/)' || true; } \
              | { grep -v '^docs/content/' || true; } \
              | while IFS= read -r file; do
                  echo "Auto-resolving conflict (keeping stable version): $file"
                  # Check for a stage-2 ("ours") entry in the index, which means
                  # the file exists on the stable side of the conflict. Otherwise
                  # the file was newly added on main and we drop it.
                  if git show ":2:$file" >/dev/null 2>&1; then
                    git checkout --ours -- "$file"
                    git add -- "$file"
                  else
                    git rm -f -- "$file"
                  fi
                done

            # Lockfile conflicts can be resolved by re-running pnpm install,
            # but only when no other conflicts remain (to avoid pnpm choking
            # on conflict markers in other files).
            REMAINING_BEFORE_LOCKFILE=$(git diff --name-only --diff-filter=U | grep -v '^pnpm-lock.yaml$' || true)
            if [ -z "$REMAINING_BEFORE_LOCKFILE" ] && git diff --name-only --diff-filter=U | grep -q '^pnpm-lock.yaml$'; then
              echo "Auto-resolving pnpm-lock.yaml conflict"
              pnpm install --no-frozen-lockfile
              git add pnpm-lock.yaml
            fi

            # Check if all conflicts are now resolved
            REMAINING=$(git diff --name-only --diff-filter=U || true)
            if [ -z "$REMAINING" ]; then
              GIT_EDITOR=true git cherry-pick --continue
              echo "status=clean" >> "$GITHUB_OUTPUT"
              echo "cherry_pick_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            else
              echo "status=conflict" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Push clean backport
        if: steps.cherry-pick.outputs.status == 'clean'
        run: git push origin stable

      - name: Install opencode
        if: steps.cherry-pick.outputs.status == 'conflict'
        run: npm install -g opencode-ai@1.4.3

      - name: Configure opencode
        if: steps.cherry-pick.outputs.status == 'conflict'
        env:
          AI_GATEWAY_TOKEN: ${{ secrets.AI_GATEWAY_API_KEY }}
        run: |
          mkdir -p ~/.local/share/opencode
          jq -n --arg key "$AI_GATEWAY_TOKEN" '{vercel:{type:"api",key:$key}}' > ~/.local/share/opencode/auth.json

      - name: Resolve conflicts with opencode
        if: steps.cherry-pick.outputs.status == 'conflict'
        id: ai-resolve
        continue-on-error: true
        env:
          OPENCODE_PERMISSION: '{"allow":["*"]}'
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          COMMIT_MSG=$(git log -1 --format='%B' "$MERGE_SHA")

          cat > /tmp/backport-prompt.txt <<PROMPT
          The working tree has git merge conflicts from a failed cherry-pick.
          A commit is being cherry-picked from the main branch to the stable branch.

          PR title: $PR_TITLE
          Commit message: $COMMIT_MSG

          IMPORTANT: Some directories are not fully maintained on the stable
          branch and should be auto-resolved by keeping the stable side:

          - docs/ (except docs/content/): the docs app is a minimal
            placeholder on stable; only docs/content/ is actively maintained
            (markdown files bundled into npm packages).
          - skills/: skill files are unrelated to npm packaging and are not
            maintained on stable.

          If any remaining conflicts involve files under docs/ that are NOT
          in docs/content/, or any files under skills/, resolve them by
          keeping the stable branch version (the <<<<<<< HEAD side) and
          discarding the incoming change from main. If the file does not
          exist on the stable side (HEAD side is empty), remove it with
          "git rm". Conflicts in docs/content/ should be resolved normally.

          Resolve all merge conflicts in the working tree. The content between
          <<<<<<< HEAD and ======= is the current stable branch. The content between
          ======= and >>>>>>> is the incoming change from main.

          After resolving each file, run git add on it to mark it as resolved.
          Do NOT run git cherry-pick --continue or git commit.
          PROMPT

          opencode run --model vercel/anthropic/claude-opus-4.7 "$(cat /tmp/backport-prompt.txt)"

          # Verify all conflicts are resolved
          REMAINING=$(git diff --name-only --diff-filter=U || true)
          if [ -z "$REMAINING" ]; then
            GIT_EDITOR=true git cherry-pick --continue
            echo "resolved=true" >> "$GITHUB_OUTPUT"
            echo "cherry_pick_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create backport PR with AI-resolved conflicts
        if: steps.cherry-pick.outputs.status == 'conflict' && steps.ai-resolve.outputs.resolved == 'true'
        id: backport-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BRANCH="backport/pr-${PR_NUMBER}-to-stable"
          git checkout -B "$BRANCH"
          git push --force-with-lease origin "$BRANCH"

          EXISTING_PR=$(gh pr list --state open --base stable --head "$BRANCH" --json url --jq '.[0].url')

          if [ -n "$EXISTING_PR" ]; then
            PR_URL="$EXISTING_PR"
          else
            PR_URL=$(gh pr create \
              --base stable \
              --head "$BRANCH" \
              --title "Backport #${PR_NUMBER}: $PR_TITLE" \
              --body "$(cat <<'BODY'
          Automated backport of #${{ github.event.pull_request.number }} to `stable`.

          Merge conflicts were resolved by AI ([opencode](https://opencode.ai) with Claude Opus). **Please review the conflict resolution before merging.**
          BODY
          )")
          fi
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Comment on clean backport
        if: steps.cherry-pick.outputs.status == 'clean'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const originalSha = '${{ github.event.pull_request.merge_commit_sha }}'.slice(0, 7);
            const cherryPickSha = '${{ steps.cherry-pick.outputs.cherry_pick_sha }}'.slice(0, 7);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `Backported to \`stable\` (${originalSha} -> ${cherryPickSha}).`
            });

      - name: Comment on AI-resolved backport
        if: steps.cherry-pick.outputs.status == 'conflict' && steps.ai-resolve.outputs.resolved == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: 'Cherry-pick to `stable` had conflicts that were resolved by AI. Please review the backport PR: ${{ steps.backport-pr.outputs.pr_url }}'
            });

      - name: Comment on conflict failure
        if: always() && steps.cherry-pick.outputs.status == 'conflict' && steps.ai-resolve.outputs.resolved != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sha = '${{ github.event.pull_request.merge_commit_sha }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                '**Backport to `stable` failed** — the cherry-pick had conflicts that could not be resolved automatically.',
                '',
                'To resolve manually:',
                '```bash',
                'git fetch origin stable',
                'git checkout stable',
                `git cherry-pick ${sha}`,
                '# Fix conflicts, then:',
                'git cherry-pick --continue',
                'git push origin stable',
                '```'
              ].join('\n')
            });

      - name: Comment on unexpected failure
        if: always() && steps.cherry-pick.outputs.status != 'clean' && steps.cherry-pick.outputs.status != 'conflict'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `**Backport to \`stable\` failed** — unexpected error before the cherry-pick could be attempted. [See workflow run](${runUrl}).`
            });
