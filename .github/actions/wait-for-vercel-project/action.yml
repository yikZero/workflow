name: 'Wait for Vercel Project Deployment'
description: 'Wait for a specific Vercel project deployment to be ready, using the GitHub Deployments API.'
author: 'v0'

inputs:
  project-slug:
    description: 'Vercel project slug (e.g. "example-nextjs-workflow-webpack"). Used to identify the GitHub Deployment via its environment name ("Preview – <slug>" / "Production – <slug>").'
    required: true
  environment:
    description: 'Which deployment to wait for: "production" or "preview".'
    required: false
    default: 'preview'
  timeout:
    description: 'Maximum time to wait in seconds.'
    required: false
    default: '600'
  check-interval:
    description: 'How often to poll in seconds.'
    required: false
    default: '10'
  github-token:
    description: 'GitHub token used to query the Deployments API. Defaults to GITHUB_TOKEN.'
    required: false
    default: ${{ github.token }}

outputs:
  deployment-url:
    description: 'The URL of the ready deployment (e.g. https://my-project-abc123.vercel.app).'
  deployment-id:
    description: 'The Vercel deployment ID (dpl_xxx), resolved from the matching commit status. Empty string if it could not be resolved.'

runs:
  using: 'node20'
  main: 'dist/index.js'
